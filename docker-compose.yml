services:
  db:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - todo-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://db:27017/todo}
      - PORT=${BACKEND_PORT:-5000}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:3000}
    networks:
      - todo-net
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - todo-net
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mongo_data:
    driver: local

networks:
  todo-net:
    driver: bridge
